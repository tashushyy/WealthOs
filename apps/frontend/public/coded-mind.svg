  <!-- Wordmark -->
  <text x="118" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="600" letter-spacing="1">
    <tspan fill="#2b2b2b">CODED</tspan><tspan fill="#d97760">MIND</tspan>

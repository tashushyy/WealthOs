[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wealthos-financial-engine"
version = "0.1.0"
description = "Pure financial calculations for WealthOS. No I/O, no framework code."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "WealthOS" }]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "ruff>=0.5",
    "black>=24.0",
    "isort>=5.13",
]

[tool.hatch.build.targets.wheel]
packages = ["src/financial_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers --cov=financial_engine --cov-report=term-missing --cov-fail-under=80"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]
